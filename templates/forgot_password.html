<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Forgot Password - TaskForge</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#0f172a;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            width:400px;
            background:#1e293b;
            padding:40px;
            border-radius:20px;
            box-shadow:0 0 20px rgba(0,0,0,0.4);
        }

        .title{
            text-align:center;
            color:#38bdf8;
            font-size:32px;
            margin-bottom:30px;
            font-weight:bold;
        }

        .subtitle{
            text-align:center;
            color:#cbd5e1;
            margin-bottom:30px;
        }

        input{
            width:100%;
            padding:14px;
            margin-bottom:20px;
            border:none;
            border-radius:10px;
            background:#0f172a;
            color:white;
            font-size:15px;
        }

        input::placeholder{
            color:#94a3b8;
        }

        button{
            width:100%;
            padding:14px;
            border:none;
            border-radius:10px;
            background:#38bdf8;
            color:white;
            font-size:16px;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#0ea5e9;
        }

        .back{
            margin-top:20px;
            text-align:center;
        }

        .back a{
            color:#38bdf8;
            text-decoration:none;
        }

    </style>

</head>

<body>

    <div class="container">

        <div class="title">
            TaskForge
        </div>

        <div class="subtitle">
            Reset Your Password
        </div>

        <form method="POST">

            <input type="email"
                   name="email"
                   placeholder="Enter Your Email"
                   required>

            <input type="password"
                   name="new_password"
                   placeholder="Enter New Password"
                   required>

            <button type="submit">
                Reset Password
            </button>

        </form>

        <div class="back">
            <a href="/">Back to Login</a>
        </div>

    </div>

</body>

</html>
